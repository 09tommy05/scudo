openapi: 3.0.4
info:
  version: "1.0"
  title: "SCUDO"
  description: API for SCUDO application
  license:
    name: MIT
servers:
  - url: http://127.0.0.1:3010/api/v1
    description: Localhost
  - url: https://scudo.tn.it/api/v1
    description: Staging server
  - url: https://scudo.ondrender.com/api/v1
    description: Production server
paths:
  /articles:
    get:
      summary: Get all published articles
      tags:
        - Articles
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Search articles by title or short_text or text
        - in: query
          name: category
          schema:
            type: string
          description: Filter articles by category
      responses:
        "200":
          description: A list of published articles of the guide
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    self:
                      type: string
                    id:
                      type: string
                    title:
                      type: string
                    img:
                      type: string
                    short_text:
                      type: string
                    categoria:
                      type: string
                    author:
                      type: object
                      $ref: "#/components/schemas/Author"
                    last_edit:
                      type: string
                      format: date-time
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
    post:
      summary: Create and publish a new article
      tags:
        - Articles
      security:
        - XAccessTokenHeaderAuth: []
        - TokenQueryAuth: []
      parameters:
        - in: query
          name: draft
          schema:
            type: boolean
          description: Set to true to create a draft article
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                text:
                  type: string
                short_text:
                  type: string
                categoria:
                  type: string
                img:
                  type: string

      responses:
        "201":
          description: Article created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  self:
                    type: string
                  article:
                    type: object
                    $ref: "#/components/schemas/Article"
        "401":
          description: Missing token
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Invalid token or insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /articles/{id}:
    get:
      summary: Get article by ID
      tags:
        - Articles
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Article details
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/Article"
        "400":
          description: Invalid article ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          description: Article not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
    put:
      summary: Update an article by ID
      tags:
        - Articles
      security:
        - XAccessTokenHeaderAuth: []
        - TokenQueryAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                text:
                  type: string
                short_text:
                  type: string
                categoria:
                  type: string
                img:
                  type: string

      responses:
        "200":
          description: Article updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  article:
                    type: object
                    $ref: "#/components/schemas/Article"
        "400":
          description: Invalid article ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          description: Missing token
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Invalid token or insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          description: Article not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
    patch:
      summary: Publish a draft article by ID
      tags:
        - Articles
      security:
        - XAccessTokenHeaderAuth: []
        - TokenQueryAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Article published successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  self:
                    type: string
                  article:
                    type: object
                    $ref: "#/components/schemas/Article"
        "400":
          description: Invalid article ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          description: Missing token
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Invalid token or insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          description: Article not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
    delete:
      summary: Delete an article by ID
      tags:
        - Articles
      security:
        - XAccessTokenHeaderAuth: []
        - TokenQueryAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Article deleted successfully
        "400":
          description: Invalid article ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          description: Missing token
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Invalid token or insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          description: Article not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /auth/operator/login:
    post:
      summary: Operator login and obtain JWT token
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  token:
                    type: string
                  id:
                    type: string
                  self:
                    type: string
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          description: Invalid email or password
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Operator account is inactive
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /auth/spid/login:
    post:
      summary: SPID login for users
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  self:
                    type: string
                  message:
                    type: string
                  token:
                    type: string
                  id:
                    type: string
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          description: Authentication failed email or password invalid
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /auth/cie/login:
    post:
      summary: CIE login for users
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  self:
                    type: string
                  token:
                    type: string
                  id:
                    type: string
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          description: Authentication failed email or password invalid
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /auth/operator/{id}:
    patch:
      summary: Change operator's password for the first login
      tags:
        - Authentication
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: token
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                newPassword:
                  type: string
      responses:
        "200":
          description: Password changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          description: Missing token or authentication failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Invalid token or insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          description: Operator not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /auth/me/:
    get:
      summary: Get authenticated user information
      tags:
        - Authentication
      security:
        - XAccessTokenHeaderAuth: []
        - TokenQueryAuth: []
      responses:
        "200":
          description: Authenticated user information
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Operator"
                  - $ref: "#/components/schemas/User"
        "401":
          description: Missing token
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Invalid token
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /communications:
    get:
      summary: Get all published communications
      tags:
        - Communications
      parameters:
        - in: query
          name: sort
          schema:
            type: string
            enum: ["publication", "importance"]
          description: Sort communications by sort field
        - in: query
          name: direction
          schema:
            type: string
            enum: ["asc", "desc"]
          description: Sort direction
      responses:
        "200":
          description: A list of published communications
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    self:
                      type: string
                    title:
                      type: string
                    short_text:
                      type: string
                    categoria:
                      type: string
                    importance:
                      type: string
                    author:
                      type: object
                      $ref: "#/components/schemas/Author"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
    post:
      summary: Create and publish a new communication
      tags:
        - Communications
      security:
        - XAccessTokenHeaderAuth: []
        - TokenQueryAuth: []
      parameters:
        - in: query
          name: draft
          schema:
            type: boolean
          description: Set to true to create a draft comunication
        - in: query
          name: notify
          schema:
            type: boolean
          description: Set to true to send notification emails to users upon publication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                text:
                  type: string
                short_text:
                  type: string
                categoria:
                  type: string
                importance:
                  type: string
                  enum: ["basso rischio", "medio rischio", "alto rischio"]
      responses:
        "201":
          description: Communication created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  self:
                    type: string
                  communication:
                    type: object
                    $ref: "#/components/schemas/Communication"
        "401":
          description: Missing token
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Invalid token or insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
