          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /operators:
    get:
      summary: Get all operators
      tags:
        - Operators
      security:
        - XAccessTokenHeaderAuth: []
        - TokenQueryAuth: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Search operators by name or surname
        - in: query
          name: sort
          schema:
            type: string
            enum: ["name", "surname", "role"]
          description: Order operators by specified field
        - in: query
          name: direction
          schema:
            type: string
            enum: ["asc", "desc"]
          description: Order direction
      responses:
        "200":
          description: A list of operators
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  $ref: "#/components/schemas/Operator"
        "401":
          description: Missing token
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Invalid token or insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
    post:
      summary: Create a new operator
      tags:
        - Operators
      security:
        - XAccessTokenHeaderAuth: []
        - TokenQueryAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                surname:
                  type: string
                email:
                  type: string
                role:
                  type: string
                  enum: ["reporter", "editor", "admin"]
                password:
                  type: string
      responses:
        "201":
          description: Operator created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  self:
                    type: string
        "400":
          description: Invalid input data
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          description: Missing token
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Invalid token or insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "409":
          description: Operator with the given email already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
