components:
  securitySchemes:
    XAccessTokenHeaderAuth: # arbitrary name for the security scheme
      description: >-
        The API authentication.
        The API key must be passed in the header 'x-access-token'.
        The API key must be a valid JWT token.
      type: apiKey
      in: header
      name: x-access-token

    TokenQueryAuth: # arbitrary name for the security scheme
      description: >-
        The API authentication.
        The API key must be passed in the query string 'token'.
        The API key must be a valid JWT token.
      type: apiKey
      in: query
      name: token

  schemas:
    Article:
      type: object
      required:
        - title
        - text
        - author
        - short_text
        - categoria
      properties:
        _id:
          type: string
          description: "ID of the article"
        title:
          type: string
          description: "Title of the article"
        text:
          type: string
          description: "Full text of the article"
        img:
          type: string
          description: "Image filename associated with the article"
        author:
          type: object
          $ref: "#/components/schemas/Author"
        last_edit:
          type: string
          format: date-time
          description: "Date of the last edit of the article"
        isDraft:
          type: boolean
          description: "Indicates whether the article is a draft (not published) or published"
        short_text:
          type: string
          description: "Short text of the article"
        categoria:
          type: string
          description: "Category of the article"

    Author:
      type: object
      required:
        - _id
        - name
        - surname
      properties:
        _id:
          type: string
          description: "ID of the author"
        name:
          type: string
          description: "Name of the author"
        surname:
          type: string
          description: "Surname of the author"
    Communication:
      type: object
      required:
        - title
        - text
        - author
        - short_text
        - categoria
        - importance
      properties:
        _id:
          type: string
          description: "ID of the communication"
        title:
          type: string
          description: "Title of the communication"
        text:
          type: string
          description: "Full text of the communication"
        author:
          type: object
          $ref: "#/components/schemas/Author"
        isDraft:
          type: boolean
          description: "Indicates whether the communication is a draft (not published) or published"
        short_text:
          type: string
          description: "Short text of the communication"
        categoria:
          type: string
          description: "Category of the communication"
        importance:
          type: string
          enum: ["basso rischio", "medio rischio", "alto rischio"]
          description: "Importance level of the communication"
        publication:
          type: string
          format: date-time
          description: "Publication datetime of the communication"
    Operator:
      type: object
      required:
        - name
        - surname
        - email
        - role
        - isActive
      properties:
        id:
          type: string
          description: "ID of the operator"
        name:
          type: string
          description: "Name of the operator"
        surname:
          type: string
          description: "Surname of the operator"
        email:
          type: string
          description: "Email of the operator"
        role:
          type: string
          enum: ["reporter", "editor", "admin"]
          description: "Role of the operator"
        isActive:
          type: boolean
          description: "Indicates whether the operator is active or not"
    Report:
      type: object
      required:
        - title
        - text
        - author
        - created
        - categoria
        - attachments
        - status
      properties:
        _id:
          type: string
          description: "ID of the report"
        title:
          type: string
          description: "Title of the report"
        text:
          type: string
          description: "Full text of the report"
        author:
          type: object
          $ref: "#/components/schemas/Author"
        created:
          type: string
          format: date-time
          description: "Creation datetime of the report"
        categoria:
          type: string
          description: "Category of the report"
        attachments:
          type: array
          items:
            type: string
          description: "Attachments of the report"
        status:
          type: string
          enum: ["da elaborare", "in lavorazione", "risolta"]
          description: "Status of the report"
    ReportAnswer:
      type: object
      required:
        - report
        - author
        - text
        - title
      properties:
        _id:
          type: string
          description: "ID of the report answer"
        report:
          type: string
          description: "ID of the associated report"
        title:
          type: string
          description: "Title of the report answer"
        text:
          type: string
          description: "Full text of the report answer"
        author:
          type: object
          $ref: "#/components/schemas/Author"
        created:
          type: string
          format: date-time
          description: "Creation datetime of the report answer"
    User:
      type: object
      required:
        - name
        - surname
        - email
        - cf
      properties:
        id:
          type: string
          description: "ID of the user"
        name:
          type: string
          description: "Name of the user"
        surname:
          description: "Surname of the user"
        email:
          type: string
          description: "Email of the user"
        cf:
          type: string
          description: "Fiscal code of the user"
        allow_notifications:
          type: boolean
          description: "Indicates whether the user allows notifications or not"