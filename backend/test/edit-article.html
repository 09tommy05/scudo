<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Test POST & PUT Article</title>
</head>
<body>
    <h1>Test POST e PUT Articolo (JWT in header)</h1>

    <label>JWT Token:</label><br>
    <input id="jwt" type="text" size="80" placeholder="Inserisci qui il tuo token JWT"><br><br>

    <label>ID articolo (solo per PUT):</label><br>
    <input id="articleId" type="text" size="40" placeholder="ID articolo da modificare"><br><br>

    <form id="articleForm" enctype="multipart/form-data">
        <label>Titolo:</label><br>
        <input type="text" name="title" required><br><br>

        <label>Testo:</label><br>
        <textarea name="text" rows="5" cols="40" required></textarea><br><br>

        <label>Short text:</label><br>
        <input type="text" name="short_text" required><br><br>

        <label>Categoria:</label><br>
        <input type="text" name="categoria" required><br><br>

        <label>Draft (true/false):</label><br>
        <input type="text" name="isDraft" placeholder="false" required><br><br>

        <label>Immagine:</label><br>
        <input type="file" name="img" accept="image/*"><br><br>

        <button type="button" onclick="sendPost()">Invia POST</button>
        <button type="button" onclick="sendPut()">Invia PUT</button>
    </form>

    <h2>Risposta server:</h2>
    <pre id="response"></pre>

    <script>
        function getToken() {
            return document.getElementById("jwt").value.trim();
        }

        function getArticleId() {
            return document.getElementById("articleId").value.trim();
        }

        async function sendPost() {
            const formElement = document.getElementById("articleForm");
            const formData = new FormData(formElement);

            const token = getToken();

            try {
                const res = await fetch("http://localhost:3010/api/v1/articles/draft", {
                    method: "POST",
                    headers: {
                        "x-access-token": token
                    },
                    body: formData
                });

                const data = await res.json();
                document.getElementById("response").textContent = JSON.stringify(data, null, 2);
            } catch (err) {
                document.getElementById("response").textContent = "Errore: " + err;
            }
        }

        async function sendPut() {
            const id = getArticleId();
            if (!id) {
                alert("Devi inserire l'ID dell'articolo per il PUT!");
                return;
            }

            const formElement = document.getElementById("articleForm");
            const formData = new FormData(formElement);

            const token = getToken();

            try {
                const res = await fetch(`http://localhost:3010/api/v1/articles/${id}`, {
                    method: "PUT",
                    headers: {
                        "x-access-token": token
                    },
                    body: formData
                });

                const data = await res.json();
                document.getElementById("response").textContent = JSON.stringify(data, null, 2);
            } catch (err) {
                document.getElementById("response").textContent = "Errore: " + err;
            }
        }
    </script>
</body>
</html>
