<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Test Upload Articolo con JWT</title>
</head>
<body>
    <h1>Test Upload Articolo (JWT in header)</h1>

    <form id="articleForm" enctype="multipart/form-data">
        <label>Titolo:</label><br>
        <input type="text" name="title" required><br><br>

        <label>Testo:</label><br>
        <textarea name="text" rows="5" cols="40" required></textarea><br><br>

        <label>Short text:</label><br>
        <input type="text" name="short_text" required><br><br>

        <label>Categoria:</label><br>
        <input type="text" name="categoria" required><br><br>

        <label>Immagine:</label><br>
        <input type="file" name="img" accept="image/*"><br><br>

        <button type="submit">Invia</button>
    </form>

    <pre id="response"></pre>

    <script>
        document.getElementById("articleForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const form = e.target;
            const formData = new FormData(form);

            const token = "<INSERT_YOUR_TOKEN_HERE>"; //TODO change

            try {
                const response = await fetch("http://localhost:3010/api/v1/articles", {
                    method: "POST",
                    headers: {
                        "x-access-token": token
                    },
                    body: formData
                });

                const result = await response.json();
                document.getElementById("response").textContent = JSON.stringify(result, null, 2);
            } catch (err) {
                document.getElementById("response").textContent = "Errore: " + err;
            }
        });
    </script>
</body>
</html>
